services:
  - type: web
    name: acetrack-suggested
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node server.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false # User must set this in Render UI
