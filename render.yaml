services:
  - type: web
    name: acetrack-suggested
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false # User must set this in Render UI
      - key: GMAIL_USER
        sync: false # No longer required for GAS Relay, but kept for legacy fallback
      - key: GMAIL_APP_PASSWORD
        sync: false # No longer required for GAS Relay, but kept for legacy fallback
      - key: GAS_EMAIL_URL
        sync: false # Required for HTTP Email Relay bypassing SMTP
      - key: JWT_SECRET
        sync: false # Required for auth sessions — set in Render UI
