services:
  - type: web
    name: acetrack-suggested
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 3000
      - key: MONGODB_URI
        sync: false # User must set this in Render UI
      - key: RESEND_API_KEY
        sync: false # Required for email dispatch (HTTP API) — set in Render UI
      - key: JWT_SECRET
        sync: false # Required for auth sessions — set in Render UI
