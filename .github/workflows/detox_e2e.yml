name: Detox End-to-End Tests

on:
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]

jobs:
  ios-e2e:
    name: iOS E2E (Detox)
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Apple Simulator
        run: |
          xcrun simctl list devices
          # Create the simulator defined in .detoxrc.js
          DEVICE_TYPE_ID=$(xcrun simctl list devicetypes | grep "iPhone 15" | awk -F '[()]' '{print $(NF-1)}')
          RUNTIME_ID=$(xcrun simctl list runtimes | grep iOS | head -1 | awk -F '[()]' '{print $(NF-1)}')
          xcrun simctl create "iPhone 15" "$DEVICE_TYPE_ID" "$RUNTIME_ID" || true

      - name: Build and Test iOS
        run: npm run test:e2e:ios:release
        env:
          TESTING: true
          NODE_ENV: production

  android-e2e:
    name: Android E2E (Detox)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Android
        run: npm run build:e2e:android:release

      - name: Run Detox Tests on Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: npm run test:e2e:android:release -- --cleanup
        env:
          TESTING: true
          NODE_ENV: production
          DETOX_AVD_NAME: test
